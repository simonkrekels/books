library_dir: ~/Documents/papers
db_path: ~/.local/share/book/library.db
chroma_dir: ~/.local/share/book/chroma

import:
  mode: move            # copy | move | symlink
  path_template: "{author_last}/{year}/{title_slug}.pdf"

metadata:
  sources: [crossref, arxiv]
  crossref_mailto: simonkrekels@gmail.com
  user_agent: "book/0.1 (mailto:simonkrekels@gmail.com)"

index:
  embedder: sentence-transformers
  model: BAAI/bge-small-en-v1.5
  chunk_tokens: 512
  chunk_overlap: 64
  device: cpu           # cpu | mps | cuda
  # When true, never hit HuggingFace Hub: no auth warning, no progress
  # bars, no version checks. The chosen model must already be cached
  # (run once with offline:false to download, then flip this on).
  offline: false
  hybrid: true              # fuse BM25 (SQLite FTS5) with cosine search
